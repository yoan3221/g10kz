name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: /tmp/g10kz-target

jobs:
  check:
    name: Check + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude g10kz-discord --exclude g10kz-bot -- -D warnings

      - name: Tests
        run: cargo test --workspace --exclude g10kz-discord --exclude g10kz-bot

      - name: Smoke test (once mode)
        env:
          LLM_PROVIDER: mock
        run: cargo run -p g10kz-bot -- once "你好小十"
