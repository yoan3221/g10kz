# g10kz v5 — docker-compose for production (.94)
# Usage:
#   docker compose up -d          # start bot
#   docker compose logs -f bot    # tail bot logs
#   docker compose down           # stop
#
# Networking: host mode so the bot reaches the co-located new-api gateway
# (localhost:3000) and the EverOS memory sidecar (localhost:8000) directly.
# EverOS runs as a separate stack; this compose only manages the bot.

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: g10kz-bot:latest
    container_name: g10kz-bot
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      # SillyTavern V2 character card, read-only
      - ./persona:/persona:ro
    command: daemon
